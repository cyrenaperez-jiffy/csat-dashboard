name: Update CSAT Data

on:
  # Runs every Monday at 10am UTC (adjust for your timezone)
  schedule:
    - cron: '0 10 * * 1'
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium
          playwright install-deps

      - name: Run scraper
        env:
          HEX_EMAIL: ${{ secrets.HEX_EMAIL }}
          HEX_PASSWORD: ${{ secrets.HEX_PASSWORD }}
        run: python scripts/update_data.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "chore: update CSAT data $(date +%Y-%m-%d)"
          git push
